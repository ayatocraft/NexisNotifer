<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexis Notifier</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111">

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding-top:60px;
}
button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#2979ff;
    color:white;
}
.status{
    margin-top:20px;
    opacity:0.7;
}
</style>
</head>
<body>

<h2>Nexis Notifier</h2>
<button onclick="enableNotifications()">通知を有効化</button>
<div class="status" id="status">初期化中...</div>

<script>
const ABLY_KEY = "JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY";
const CHANNEL_NAME = "nexis-chat";
const username = localStorage.getItem("username") || "guest";

// Service Worker登録
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// 通知許可
async function enableNotifications() {
    const permission = await Notification.requestPermission();
    if (permission === "granted") {
        alert("通知が有効になりました！");
    }
}

// Ably接続
const ably = new Ably.Realtime(ABLY_KEY);
const channel = ably.channels.get(CHANNEL_NAME);

ably.connection.on("connected", () => {
    document.getElementById("status").innerText = "接続完了。監視中...";
});

channel.subscribe((msg) => {

    if (!msg.data) return;
    if (msg.data.user === username) return;

    if (Notification.permission === "granted") {
        navigator.serviceWorker.ready.then(reg => {
            reg.showNotification(msg.data.user + " からメッセージ", {
                body: msg.data.text,
                icon: "icon.png",
                badge: "icon.png"
            });
        });
    }
});
</script>

</body>
</html>
