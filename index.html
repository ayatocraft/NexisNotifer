<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexis Notifier</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111">

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding-top:60px;
}
input{
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:none;
}
button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#2979ff;
    color:white;
    margin-top:10px;
}
.status{
    margin-top:20px;
    opacity:0.7;
}
</style>
</head>
<body>

<h2>Nexis Notifier</h2>

<div id="setup">
    <p>IDを入力してください</p>
    <input id="idInput" placeholder="あなたのID">
    <br>
    <button onclick="saveId()">保存</button>
</div>

<div id="main" style="display:none;">
    <p id="monitorText"></p>
    <button onclick="enableNotifications()">通知を有効化</button>
    <div class="status" id="status">接続中...</div>
</div>

<script>
const ABLY_KEY = "JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY";

const params = new URLSearchParams(location.search);
const urlId = params.get("id");
const savedId = localStorage.getItem("nexis_id");

if(urlId){
    document.getElementById("idInput").value = urlId;
}

if(savedId){
    start(savedId);
}

function saveId(){
    const id = document.getElementById("idInput").value.trim();
    if(!id) return alert("IDを入力してください");

    localStorage.setItem("nexis_id", id);
    location.reload();
}

async function enableNotifications(){
    const perm = await Notification.requestPermission();
    alert("通知状態: " + perm);
}

function start(id){

    document.getElementById("setup").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("monitorText").innerText =
        "監視中: inbox-" + id;

    // Service Worker登録
    if('serviceWorker' in navigator){
        navigator.serviceWorker.register("sw.js");
    }

    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get("inbox-" + id);

    ably.connection.on("connected", ()=>{
        document.getElementById("status").innerText = "接続完了";
    });

   channel.subscribe((msg)=>{

    if(Notification.permission !== "granted") return;

    // -----------------------
    // 👥 フレンド追加通知
    // -----------------------
    if(msg.name === "friend-add"){

        const name =
            msg.data?.name ||
            msg.data?.username ||
            "誰か";

        navigator.serviceWorker.ready.then(reg=>{
            reg.showNotification("Nexis 通知", {
                body: `${name} があなたと友だちになりました。`,
                icon: "icon.png",
                badge: "icon.png",
                tag: "friend-add",
                data: {
                    url: "https://ayatocraft.github.io/NexisChat/"
                }
            });
        });

    }

    // -----------------------
    // 💬 新着メッセージ通知
    // -----------------------
    if(msg.name === "message"){

        const name =
            msg.data?.name ||
            msg.data?.username ||
            "誰か";

        const text =
            msg.data?.text ||
            msg.data?.message ||
            "";

        navigator.serviceWorker.ready.then(reg=>{
            reg.showNotification("新着メッセージ", {
                body: `${name}: ${text}`,
                icon: "icon.png",
                badge: "icon.png",
                tag: "message",
                data: {
                    url: "https://ayatocraft.github.io/NexisChat/"
                },
                actions: [
                    {
                        action: "open",
                        title: "Chatを開く"
                    }
                ]
            });
        });

    }

});
document.addEventListener("DOMContentLoaded", ()=>{

    const idInput = document.getElementById("idInput");

    if(!idInput) return;

    // ① まずURLパラメータ確認
    const params = new URLSearchParams(location.search);
    const urlId = params.get("id");

    if(urlId){
        idInput.value = urlId;
        localStorage.setItem("nexis_id", urlId);
        return;
    }

    // ② localStorage確認
    const savedId = localStorage.getItem("nexis_id");

    if(savedId){
        idInput.value = savedId;
    }

});
</script>

</body>
</html>
