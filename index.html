<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexis Notifier</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9b5cff">

<style>
body{
    font-family:sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:30px;
}
input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:12px;
}
button{
    margin-top:12px;
    width:100%;
    background:#9b5cff;
    border:none;
    padding:10px;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
}
#status{
    margin-top:15px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>
<body>

<h2>🔔 Nexis Notifier</h2>

<input id="idInput" placeholder="あなたのID">
<button id="saveBtn">保存して開始</button>
<div id="status"></div>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
<script>

const ABLY_KEY = "JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY"; // ← ここ変更

document.addEventListener("DOMContentLoaded", async ()=>{

    const input = document.getElementById("idInput");
    const saveBtn = document.getElementById("saveBtn");
    const status = document.getElementById("status");

    // Service Worker登録
    if("serviceWorker" in navigator){
        await navigator.serviceWorker.register("sw.js");
    }

    // 通知許可
    if(Notification.permission !== "granted"){
        await Notification.requestPermission();
    }

    // URLパラメータ取得
    const params = new URLSearchParams(location.search);
    const urlId = params.get("id");

    if(urlId){
        localStorage.setItem("nexis_id", urlId);
    }

    const savedId = localStorage.getItem("nexis_id");

    if(savedId){
        input.value = savedId;
        start(savedId);
    }

    saveBtn.onclick = ()=>{
        const id = input.value.trim();
        if(!id) return alert("IDを入力してください");

        localStorage.setItem("nexis_id", id);
        start(id);
    };

});

function start(id){

    const status = document.getElementById("status");
    status.textContent = "接続中...";

    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get("inbox-" + id);

    channel.subscribe((msg)=>{

        if(Notification.permission !== "granted") return;

        if(msg.name === "friend-add"){
            const name = msg.data?.name || "誰か";
            notify("Nexis 通知",
                `${name} があなたと友だちになりました。`
            );
        }

        if(msg.name === "message"){
            const name = msg.data?.name || "誰か";
            const text = msg.data?.text || msg.data?.message || "";
            notify("新着メッセージ",
                `${name}: ${text}`
            );
        }

    });

    status.textContent = "監視中 ✔ アプリを閉じないでください。";
}

function notify(title, body){

    navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(title,{
            body:body,
            icon:"icon.png",
            badge:"icon.png",
            tag:"nexis",
            data:{
                url:"https://ayatocraft.github.io/NexisChat/"
            },
            actions:[
                {action:"open", title:"Chatを開く"}
            ]
        });
    });

}

</script>
</body>
</html>
